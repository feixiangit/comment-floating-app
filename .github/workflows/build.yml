name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
    
    - name: Create Gradle Wrapper
      run: |
        cd comment-floating-app
        gradle wrapper --gradle-version 8.2
    
    - name: Build Debug APK
      run: |
        cd comment-floating-app
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --warning-mode=all || true
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Build output not found"
    
    - name: Debug Build Output
      run: |
        cd comment-floating-app
        echo "=== Build Directory ==="
        ls -la app/build/ 2>/dev/null || echo "No build directory"
        echo "=== APK Directory ==="
        ls -la app/build/outputs/ 2>/dev/null || echo "No outputs directory"
    
    - name: Upload APK
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: app-debug
        path: comment-floating-app/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 5
    
    - name: Upload Build Logs
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: build-logs
        path: |
          comment-floating-app/app/build/reports/
          comment-floating-app/app/build/outputs/
        retention-days: 5
